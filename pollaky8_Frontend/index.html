  <script>
    const loggedInState = localStorage.getItem("loggedIn");
    if (!loggedInState) location.replace("./login.html");

    function logout() {
      localStorage.removeItem("loggedIn");
      localStorage.removeItem("username");
      location.replace("./login.html");
    }
  </script>

            <script>
              const username = localStorage.getItem("username");
              if (username) {
                document.getElementById("welcomeText").innerText =
                  `${username}`;
              }
            </script>
          </span>
          <div class="dropDown">
            <i onclick="DropMenu(), SetColor()" id="SetColor" class="fa-solid fa-user logout"></i>
            <!-- <button class="logout" onclick="logout()">Kijelentkezés</button> -->
            <script>
              var turns = 0;

              function SetColor() {
                if (turns === 0) {
                  turns++;
                  document.getElementById("SetColor").style.color = '#383838';
                } else if (turns === 1) {
                  turns--;
                  document.getElementById("SetColor").style.color = '#FFFFFF';
                }
              }


              function DropMenu() {
                document.getElementById("Drop").classList.toggle("show");
              }
              window.onclick = function (event) {
                if (!event.target.matches(".logout")) {
                  var dropdowns =
                    document.getElementsByClassName("dropdown-content");
                  var i;
                  for (i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains("show")) {
                      openDropdown.classList.remove("show");
                    }
                  }
                }
              };
            </script>
            <div id="Drop" class="dropdown-content">
              <a id="logout" href="#" onclick="logout()">Kijelentkezés</a>
            </div>
          </div>
        </div>
      </div>
