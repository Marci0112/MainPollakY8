<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="canonical" href="https://codepen.io/mr-zouraiz123/pen/ZEeKMVP" />
    <link rel="stylesheet" href="css/login.css" />
    <script>
      const loggedInState = localStorage.getItem("loggedIn");
      if (loggedInState) location.replace("/index.html");
    </script>
  </head>
  <body>
    <div class="wrapper">
      <div class="title-text">
        <div class="title login">Login Form</div>
        <div class="title signup">Signup Form</div>
      </div>
      <div class="form-container">
        <div class="slide-controls">
          <input type="radio" name="slide" id="login" checked />
          <input type="radio" name="slide" id="signup" />
          <label for="login" class="slide login">Login</label>
          <label for="signup" class="slide signup">Signup</label>
          <div class="slider-tab"></div>
        </div>
        <div class="form-inner">
          <form action="" class="login" id="loginForm">
            <div class="field">
              <input
                type="text"
                name="username"
                id="username"
                placeholder="Email Address"
                required
              />
            </div>
            <div class="field">
              <input
                type="password"
                name="password"
                id="password"
                placeholder="Password"
                required
              />
            </div>
            <div class="pass-link"><a href="#">Forgot password?</a></div>
            <div class="field btn">
              <div class="btn-layer"></div>
              <!-- name="login" ELTÁVOLÍTVA - ez írta felül a login() függvényt! -->
              <input type="submit" value="Login" />
            </div>
            <div class="signup-link">
              Not a member? <a href="#">Signup now</a>
            </div>
          </form>
          <form action="" class="signup">
            <div class="field">
              <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
              />
            </div>
            <div class="field">
              <input
                type="password"
                id="pass"
                name="password"
                placeholder="Password"
                required
              />
            </div>
            <div class="field">
              <input
                type="password"
                id="cpass"
                name="confirm_password"
                placeholder="Confirm password"
                required
              />
            </div>
            <span style="display: none" id="error_msg"></span>
            <div class="field btn">
              <div class="btn-layer"></div>
              <input
                type="submit"
                id="sBtn"
                name="signup"
                value="Signup"
                disabled
              />
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      const loginText = document.querySelector(".title-text .login");
      const loginForm = document.querySelector("form.login");
      const loginBtn = document.querySelector("label.login");
      const signupBtn = document.querySelector("label.signup");
      const pass = document.getElementById("pass");
      const cpass = document.getElementById("cpass");
      const error = document.getElementById("error_msg");
      const sBtn = document.getElementById("sBtn");

      // Login form submit kezelése
      document.getElementById("loginForm").addEventListener("submit", function(event) {
        event.preventDefault();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        if (username === "admin" && password === "admin") {
          localStorage.setItem("loggedIn", true);
          location.replace("./index.html");
        } else {
          alert("Hibás felhasználónév vagy jelszó!");
        }
      });

      // Login/Signup tab váltás
      signupBtn.onclick = () => {
        loginForm.style.marginLeft = "-50%";
        loginText.style.marginLeft = "-50%";
      };
      loginBtn.onclick = () => {
        loginForm.style.marginLeft = "0%";
        loginText.style.marginLeft = "0%";
      };

      // Jelszó megerősítés ellenőrzése
      function confirmPass() {
        if (pass.value !== cpass.value) {
          error.style.color = "red";
          error.style.display = "block";
          error.innerText = "A jelszó nem egyezik!";
          sBtn.disabled = true;
        } else {
          error.style.display = "none";
          sBtn.disabled = false;
        }
      }

      pass.addEventListener("keyup", confirmPass);
      cpass.addEventListener("keyup", confirmPass);
    </script>
  </body>
</html>
