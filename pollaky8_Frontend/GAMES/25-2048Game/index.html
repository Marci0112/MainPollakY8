<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,400,800" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <a href="../../index.html" class="BackBtn"><i class="fa-solid fa-arrow-left-long"></i></a>

    <div class="game">
        <div class="head">
            <div class="a">2048 <button class="info" onClick='info()'>i</button> <button id="repeat" class="info repeat"
                    onClick='reset()'>↻</button></div>
            <div class="score">Score<br /><span id="value"></span></div>
            <div class="score">best<br /><span id="personalBestValue"></span></div>
        </div>
        <div class="description" id="description">
            How to play:<br /><br />
            Use your arrow-keys to slide the tiles. <br />
            Two tiles with the same value in line can be merged. The goal is to merge the tiles and get the 2048
            tile.<br /><br />
            The score is a sum of the merged tiles.<br><br />
            <span>_______________________________</span><br /><br />
            Made by Fabian Richter 01/2017
        </div>
        <div class="field">

            <div class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="row">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
        </div>

    </div>

    <script src="index.js"></script>
</body>

</html>
