<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <title>Snake Game JavaScript</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <style>
        /* style.css tartalma */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #e3f2fd;
        }
        .wrapper {
            width: 65vmin;
            height: 70vmin;
            background: #293447;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .game-details {
            color: #b8c6dc;
            font-family: "Courier New", Courier, monospace;
            font-weight: 500;
            font-size: 1.2rem;
            padding: 20px 27px;
            display: flex;
            justify-content: space-between;
        }
        .play-board {
            height: 100%;
            width: 100%;
            background: #212837;
            display: grid;
            grid-template: repeat(30, 1fr) / repeat(30, 1fr);
        }
        .play-board .food {
            background: #ff003d;
            border-radius: 50%;
        }
        .play-board .head {
            background: #60cbff;
            border-radius: 2px;
        }
        .controls {
            display: none;
            justify-content: space-between;
            padding: 10px 20px;
            background: #293447;
        }
        .controls i {
            color: #b8c6dc;
            font-size: 1.3rem;
            cursor: pointer;
            width: calc(100% / 4);
            text-align: center;
        }
        @media screen and (max-width: 800px) {
            .wrapper {
                width: 90vmin;
                height: 115vmin;
            }
            .controls {
                display: flex;
            }
        }
    </style>
</head>
<body>
<header>
        <a href="..\main.html"><button>játékok</button></a>
        <a href="..\welc.html"><Button>Kijelentkezés</Button></a>
        <hr>
    </header>
    <div class="wrapper">
        <div class="game-details">
            <span class="score">Score: 0</span>
            <span class="high-score">High Score: 0</span>
        </div>
        <div class="play-board"></div>
        <div class="controls">
            <i data-key="ArrowLeft" class="fa-solid fa-arrow-left-long"></i>
            <i data-key="ArrowUp" class="fa-solid fa-arrow-up-long"></i>
            <i data-key="ArrowRight" class="fa-solid fa-arrow-right-long"></i>
            <i data-key="ArrowDown" class="fa-solid fa-arrow-down-long"></i>
        </div>
    </div>

    <script>
        // script.js tartalma
        const playBoard = document.querySelector(".play-board");
        const scoreElement = document.querySelector(".score");
        const highScoreElement = document.querySelector(".high-score");
        const controls = document.querySelectorAll(".controls i");

        let gameOver = false;
        let foodX, foodY;
        let snakeX = 5, snakeY = 5;
        let velocityX = 0, velocityY = 0;
        let snakeBody = [];
        let setIntervalId;
        let score = 0;

        // Getting high score from local storage
        let highScore = localStorage.getItem("high-score") || 0;
        highScoreElement.innerText = `High Score: ${highScore}`;

        const updateFoodPosition = () => {
            foodX = Math.floor(Math.random() * 30) + 1;
            foodY = Math.floor(Math.random() * 30) + 1;
        }

        const handleGameOver = () => {
            clearInterval(setIntervalId);
            alert("Game Over! Press OK to replay...");
            location.reload();
        }

        const changeDirection = e => {
            if ((e.key === "ArrowUp" || e.key === "w") && velocityY != 1) {
                velocityX = 0;
                velocityY = -1;
            } else if ((e.key === "ArrowDown" || e.key === "s") && velocityY != -1) {
                velocityX = 0;
                velocityY = 1;
            } else if ((e.key === "ArrowLeft" || e.key === "a") && velocityX != 1) {
                velocityX = -1;
                velocityY = 0;
            } else if ((e.key === "ArrowRight" || e.key === "d") && velocityX != -1) {
                velocityX = 1;
                velocityY = 0;
            }
        }

        controls.forEach(button => button.addEventListener("click", () => changeDirection({ key: button.dataset.key })));

        function updatePoints(points) {
            fetch(window.location.href, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "update_points=1&points=" + points
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    console.log("Pontszám frissítve: " + data.total_points);
                }
            })
            .catch(error => console.error("Hiba:", error));
        }

        const initGame = () => {
            if (gameOver) return handleGameOver();
            let html = `<div class="food" style="grid-area: ${foodY} / ${foodX}"></div>`;

            if (snakeX === foodX && snakeY === foodY) {
                updateFoodPosition();
                snakeBody.push([foodX, foodY]);
                score++;
                updatePoints(1); // 1 pont az adatbázisba minden ételért
                highScore = score >= highScore ? score : highScore;
                localStorage.setItem("high-score", highScore);
                scoreElement.innerText = `Score: ${score}`;
                highScoreElement.innerText = `High Score: ${highScore}`;
            }

            snakeX += velocityX;
            snakeY += velocityY;

            for (let i = snakeBody.length - 1; i > 0; i--) {
                snakeBody[i] = snakeBody[i - 1];
            }
            snakeBody[0] = [snakeX, snakeY];

            if (snakeX <= 0 || snakeX > 30 || snakeY <= 0 || snakeY > 30) {
                console.log("Game Over: Wall collision");
                return gameOver = true;
            }

            for (let i = 0; i < snakeBody.length; i++) {
                html += `<div class="head" style="grid-area: ${snakeBody[i][1]} / ${snakeBody[i][0]}"></div>`;
                if (i !== 0 && snakeBody[0][1] === snakeBody[i][1] && snakeBody[0][0] === snakeBody[i][0]) {
                    console.log("Game Over: Self collision");
                    gameOver = true;
                }
            }
            playBoard.innerHTML = html;
        }

        updateFoodPosition();
        setIntervalId = setInterval(initGame, 90);
        document.addEventListener("keyup", changeDirection);
    </script>
</body>
</html>
