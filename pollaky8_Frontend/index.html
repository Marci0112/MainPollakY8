    <script>
      const loggedInState = localStorage.getItem("loggedIn");
      if (!loggedInState) location.replace("./login.html");

      function logout() {
        localStorage.removeItem("loggedIn");
        localStorage.removeItem("username");
        location.replace("./login.html");
      }
    </script>

            <div class="dropDown">
              <i onclick="DropMenu()" class="fa-solid fa-user logout"></i>
              <!-- <button class="logout" onclick="logout()">Kijelentkezés</button> -->
              <script>
                function DropMenu() {
                  document.getElementById("Drop").classList.toggle("show");
                }
                window.onclick = function (event) {
                  if (!event.target.matches(".logout")) {
                    var dropdowns =
                      document.getElementsByClassName("dropdown-content");
                    var i;
                    for (i = 0; i < dropdowns.length; i++) {
                      var openDropdown = dropdowns[i];
                      if (openDropdown.classList.contains("show")) {
                        openDropdown.classList.remove("show");
                      }
                    }
                  }
                };
              </script>
              <div id="Drop" class="dropdown-content">
                <a href="#" onclick="logout()">Kijelentkezés</a>
              </div>
            </div>
