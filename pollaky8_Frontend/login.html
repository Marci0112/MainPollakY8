<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="canonical" href="https://codepen.io/mr-zouraiz123/pen/ZEeKMVP" />
    <link rel="stylesheet" href="css/login.css" />
    <script>
      const loggedInState = localStorage.getItem("loggedIn");
      if (loggedInState) location.replace("./index.html");
    </script>
  </head>
  <body>
    <div class="wrapper">
      <div class="title-text">
        <div class="title login">Bejelentkezés</div>
        <div class="title signup">Regisztráció</div>
      </div>
      <div class="form-container">
        <div class="slide-controls">
          <input type="radio" name="slide" id="login" checked />
          <input type="radio" name="slide" id="signup" />
          <label for="login" class="slide login">Bejelentkezés</label>
          <label for="signup" class="slide signup">Regisztráció</label>
          <div class="slider-tab"></div>
        </div>
        <div class="form-inner">
          <form action="" class="login" id="loginForm">
            <div class="field">
              <input
                type="text"
                name="username"
                id="LoginUsername"
                placeholder="Felhasználónév"
                required
              />
            </div>
            <div class="field">
              <input
                type="password"
                name="password"
                id="LoginPassword"
                placeholder="Jelszó"
                required
              />
            </div>
            <div class="pass-link">
              <a href="#">Elfelejtetted a jelszavad?</a>
            </div>
            <span style="display: none" id="login_error_msg"></span>
            <div class="field btn">
              <div class="btn-layer"></div>
              <input type="submit" value="Jelentkezz be" />
            </div>
            <div class="signup-link">
              <span>Nincs fiókod?</span>
              <a href="#" class="signup-link">Regisztrálj</a>
            </div>
          </form>
          <form action="" class="signup" id="signupFrom">
            <div class="field">
              <input
                type="text"
                id="SignUpUsername"
                name="username"
                placeholder="Felhasználónév"
                required
              />
            </div>
            <div class="field">
              <input
                type="password"
                id="SignUpPassword"
                name="password"
                placeholder="Jelszó"
                required
              />
            </div>
            <div class="field">
              <input
                type="password"
                id="cpass"
                name="confirm_password"
                placeholder="Erősítsd meg a jelszavad!"
                required
              />
            </div>
            <span style="display: none" id="error_msg"></span>
            <div class="field btn">
              <div class="btn-layer"></div>
              <input
                type="submit"
                id="sBtn"
                name="signup"
                value="Regisztrálj"
                disabled
              />
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../pollaky8_Backend/LoginAndRegist/login.js"></script>
    <script src="../pollaky8_Backend/LoginAndRegist/regist.js"></script>
    <script>
      const loginText = document.querySelector(".title-text .login");
      const loginForm = document.querySelector("form.login");
      const loginBtn = document.querySelector("label.login");
      const signupBtn = document.querySelector("label.signup");
      const signupLink = document.querySelector("form .signup-link a");
      const signUpNowLink = document.getElementById("signUpNow");
      const pass = document.getElementById("SignUpPassword");
      const cpass = document.getElementById("cpass");
      const error = document.getElementById("error_msg");
      const sBtn = document.getElementById("sBtn");

      // Login/Signup tab váltás
      signupBtn.onclick = () => {
        loginForm.style.marginLeft = "-50%";
        loginText.style.marginLeft = "-50%";
      };
      loginBtn.onclick = () => {
        loginForm.style.marginLeft = "0%";
        loginText.style.marginLeft = "0%";
        error.style.display = "none";
      };
      signupLink.onclick = () => {
        signupBtn.click();
        return false;
      };

      // Jelszó megerősítés ellenőrzése
      function confirmPass() {
        const password = pass.value;
        const confirmPassword = cpass.value;
        const errors = [];

        // 1. Hossz ellenőrzés
        if (password.length < 8) {
          errors.push("A jelszónak legalább 8 karakter hosszúnak kell lennie");
        }
        // 2. Kisbetű
        if (!/[a-z]/.test(password)) {
          errors.push("Legalább egy kisbetűt tartalmazzon");
        }
        // 3. Nagybetű
        if (!/[A-Z]/.test(password)) {
          errors.push("Legalább egy nagybetűt tartalmazzon");
        }

        // 4. Számjegy
        if (!/[0-9]/.test(password)) {
          errors.push("Legalább egy számot tartalmazzon");
        }

        // 5. Egyezőség ellenőrzése
        if (password !== confirmPassword) {
          errors.push("A két jelszó nem egyezik meg");
        }
        // Döntés a hibák alapján
        if (errors.length > 0) {
          error.style.color = "red";
          error.style.display = "block";
          error.innerText = errors.join(" • "); // vagy sortöréssel: errors.join("\n")
          sBtn.disabled = true;
          sBtn.style.cursor = "default";
        } else {
          error.style.display = "none";
          sBtn.disabled = false;
          sBtn.style.cursor = "pointer";
        }
      }

      pass.addEventListener("keyup", confirmPass);
      cpass.addEventListener("keyup", confirmPass);

    </script>
  </body>
</html>
